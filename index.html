<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAKAKU — 近所の最安値トラッカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-grid"></div>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">K</div>
        <div class="logo-text">
          <span class="logo-main">KAKAKU</span>
          <span class="logo-sub">価格比較トラッカー</span>
        </div>
      </div>
      <nav class="header-nav">
        <button class="nav-btn" id="btnToggleSetup">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          設定
        </button>
        <button class="nav-btn highlighted" id="btnOpenSheet" style="display:none">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          価格履歴
        </button>
      </nav>
    </div>
  </header>

  <!-- 設定ドロワー -->
  <div class="settings-overlay" id="settingsOverlay" style="display:none">
    <div class="settings-panel">
      <div class="settings-header">
        <h3>設定</h3>
        <button class="close-btn" id="drawerClose">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p class="settings-desc">設定はブラウザに保存されます。GAS URLなしでもデモモードで試せます。</p>
      <div class="settings-fields">
        <div class="field-group">
          <label class="field-label">Google Apps Script URL</label>
          <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/..." class="field-input">
          <span class="field-hint">チラシ収集とスプレッドシート保存に使用します</span>
        </div>
        <div class="field-group">
          <label class="field-label">スプレッドシート URL <em>（任意）</em></label>
          <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..." class="field-input">
          <span class="field-hint">「価格履歴」ボタンのリンク先になります</span>
        </div>
      </div>
      <button class="save-btn" id="btnSaveConfig">保存する</button>
    </div>
  </div>

  <main class="main">
    <!-- ヒーロー検索 -->
    <section class="hero">
      <div class="hero-eyebrow">SMART PRICE TRACKER</div>
      <h1 class="hero-title">近くのスーパーの<br><span class="hero-accent">最安値</span>を一括比較</h1>
      <p class="hero-desc">住所を入力するだけ。チラシ情報を自動収集して価格を比較します。</p>
      <div class="search-container">
        <div class="search-field" id="searchField">
          <svg class="search-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="addressInput" class="search-input" placeholder="例：栃木県佐野市高砂町...">
        </div>
        <button class="search-btn" id="btnSearchStores">
          スーパーを探す
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <p class="search-note">※ GAS URL未設定の場合はデモデータで動作します</p>
    </section>

    <!-- スーパー一覧 -->
    <section class="stores-section" id="storesSection" style="display:none">
      <div class="section-header">
        <div class="section-title-row">
          <h2 class="section-title">近くのスーパー</h2>
          <span class="count-chip" id="storeCount">0件</span>
        </div>
        <div class="section-actions">
          <button class="ghost-btn" id="btnSelectAll">すべて選択</button>
          <button class="primary-btn" id="btnCollectPrices">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            チラシ収集
          </button>
        </div>
      </div>
      <div class="stores-grid" id="storesGrid"></div>
    </section>

    <!-- 収集中 -->
    <div class="loading-overlay" id="collectingOverlay" style="display:none">
      <div class="loading-card">
        <div class="loading-rings">
          <div class="ring ring-1"></div>
          <div class="ring ring-2"></div>
          <div class="ring ring-3"></div>
        </div>
        <p class="loading-title">チラシ情報を収集中</p>
        <p class="loading-store" id="collectingStoreName">—</p>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <p class="loading-count" id="progressText">0 / 0</p>
      </div>
    </div>

    <!-- 価格比較結果 -->
    <section class="results-section" id="resultsSection" style="display:none">
      <div class="section-header">
        <div class="section-title-row">
          <h2 class="section-title">価格比較結果</h2>
          <span class="time-chip" id="resultDate"></span>
        </div>
        <div class="section-actions">
          <button class="ghost-btn" id="btnReCollect">再収集</button>
          <button class="primary-btn" id="btnExportSheet">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            シートに保存
          </button>
        </div>
      </div>

      <div class="ranking-strip" id="bestDealSection"></div>
      <div class="filter-tabs" id="categoryTabs"></div>

      <div class="table-container">
        <table class="price-table">
          <thead id="priceTableHead"></thead>
          <tbody id="priceTableBody"></tbody>
        </table>
      </div>
      <div class="save-feedback" id="saveStatus" style="display:none"></div>
    </section>

    <!-- 空状態 -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon-wrap">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      </div>
      <p class="empty-title">住所を入力してください</p>
      <p class="empty-desc">近くのスーパーを探してチラシ価格を一括収集します</p>
    </div>
  </main>

  <div class="toast-wrap" id="toastContainer"></div>

  <script src="js/config.js"></script>
  <script src="js/scraper.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
